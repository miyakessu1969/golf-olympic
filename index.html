<h1 style="margin: 0.0px 0.0px 4.0px 0.0px; text-align: center; font: 26.0px 'Hiragino Sans'; color: #105a2c; -webkit-text-stroke: #105a2c"><span class="s2">⛳</span><span class="s3"><b> </b></span><span class="s4"><b>ゴルフ</b></span><span class="s3"><b> </b></span><span class="s4"><b>オリンピック計算</b></span></h1>
<p class="p3"><span class="s5">獲得メダル数を入れると、</span></p>
<p class="p3"><span class="s5">各プレイヤーの最終成績を自動計算します。</span></p>
<p class="p4"><span class="s6"><b>人数</b></span></p>
<p class="p5"><span class="s1"><span class="Apple-converted-space">        </span></span><span class="s7">2</span><span class="s8">人</span></p>
<p class="p5"><span class="s1"><span class="Apple-converted-space">        </span></span><span class="s7">3</span><span class="s8">人</span></p>
<p class="p5"><span class="s1"><span class="Apple-converted-space">        </span></span><span class="s7">4</span><span class="s8">人</span></p>
<p class="p6"><span class="s1"><span class="Apple-converted-space">      </span></span></p>
<p class="p7"><span class="s9"><b>精算設定</b></span></p>
<p class="p8"><span class="s10"><b>1</b></span><span class="s11"><b>ポイント（円）</b></span></p>
<p class="p8"><span class="s11"><b>負けの下限（円）</b></span></p>
<p class="p9"><span class="s1">例：負けの下限が</span><span class="s12">2,000</span><span class="s1">円で、実際の最大負けが</span><span class="s12">3,000</span><span class="s1">円なら、全員のポイントを</span><span class="s12"> 2,000 ÷ 3,000 </span><span class="s1">に調整します。</span></p>
<p class="p7"><span class="s9"><b>プレイヤー名と獲得メダル数</b></span></p>
